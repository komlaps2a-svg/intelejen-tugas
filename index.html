    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }

      componentDidCatch(error, errorInfo) { console.error("[FATAL CRASH]:", error, errorInfo); this.setState({ errorInfo }); }

        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-[#020617] flex flex-col items-center justify-center p-8 text-slate-200 font-mono">

                  <p className="text-red-300 font-bold mb-2">{this.state.error?.toString()}</p>

    // --- UTILITIES ---
    const useOutsideClick = (callback) => {
      const ref = useRef();
      useEffect(() => { const handleClick = (e) => { if (ref.current && !ref.current.contains(e.target)) callback(); }; document.addEventListener('mousedown', handleClick); return () => document.removeEventListener('mousedown', handleClick); }, [callback]);
      return ref;
    };

    const calculateStats = (dataArray) => {
      const n = dataArray.length; if (n === 0) return { mean: 0, median: 0, min: 0, max: 0, variance: 0, stdDev: 0 };
      const sum = dataArray.reduce((acc, val) => acc + val, 0); const mean = sum / n; const sorted = [...dataArray].sort((a, b) => a - b); const mid = Math.floor(n / 2); const median = n % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2; const variance = dataArray.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / (n > 1 ? n - 1 : 1);
      return { n, mean: mean.toFixed(3), median: median.toFixed(3), min: sorted[0], max: sorted[n - 1], variance: variance.toFixed(3), stdDev: Math.sqrt(variance).toFixed(3) };
    };

    const parseCSV = (text) => {
      const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
      if (lines.length < 2) return null;
      const firstLine = lines[0];
      const delimiter = firstLine.includes(';') ? ';' : (firstLine.includes('\t') ? '\t' : ',');
      const headers = firstLine.split(delimiter).map(h => h.trim().replace(/^"|"$/g, ''));
      const rows = lines.slice(1).map(line => {
        const values = line.split(delimiter).map(v => v.trim().replace(/^"|"$/g, ''));
        return headers.reduce((obj, header, i) => { obj[header] = values[i]; return obj; }, {});
      });
      return { headers, rows };
    };

    const fetchWithBackoff = async (url, options = {}, maxRetries = 3) => {
      const delays = [1000, 2000, 4000];
      for (let i = 0; i < maxRetries; i++) {
        try { const res = await fetch(url, options); if (!res.ok) { const errData = await res.json().catch(()=>({})); const err = new Error(errData.error?.message || res.statusText); err.status = res.status; throw err; } return res; } 
        catch (error) { if (error.status >= 400 && error.status < 500 && error.status !== 429) throw error; if (i === maxRetries - 1) throw error; await new Promise(r => setTimeout(r, delays[i])); }
      }
    };

    const stripMarkdown = (md) => md ? md.replace(/#{1,6}\s+/g, '').replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1').replace(/\[([^\]]+)\]\([^)]+\)/g, '$1').replace(/`{1,3}(.*?)`{1,3}/g, '$1').replace(/\n\s*\n/g, '\n\n') : '';
    const copyToClipboard = (text, onSuccess) => { const t = document.createElement("textarea"); t.value = stripMarkdown(text); t.style.position = "fixed"; t.style.left = "-9999px"; document.body.appendChild(t); t.select(); try { document.execCommand('copy'); if (onSuccess) onSuccess(); } catch (err) {} document.body.removeChild(t); };

    // --- HTML PARSER (FIXED: PERMISSIVE REGEX FOR CITATION BADGE) ---
    const parseMarkdownToHTML = (md) => {
        if (!md) return '';
        
        const formatInline = (text) => {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>')
                .replace(/\*(.*?)\*/g, '<em class="text-slate-300 italic">$1</em>')
                // Regex ditoleransi (\s*) untuk menangkap spasi yang sering tak sengaja dibuat LLM
                .replace(/\[([^\]]+)\]\s*\(([^)]+)\)/g, '<a href="$2" target="_blank" class="inline-flex items-center px-2 py-0.5 mx-1 mb-1 text-[11px] font-bold text-blue-100 bg-blue-600/30 border border-blue-500/40 hover:bg-blue-600 hover:text-white rounded-md transition-all shadow-sm align-middle no-underline break-all"><svg class="w-3 h-3 mr-1 opacity-70 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"></path></svg><span class="break-words max-w-[200px] truncate inline-block align-bottom">$1</span></a>');
        };

        const blocks = md.split(/\n\s*\n/);
        return blocks.map(block => {
            block = block.trim();
            if (!block) return '';

            if (block.startsWith('#')) {
                const match = block.match(/^(#{1,6})\s+(.*)/);
                if (match) {
                    const level = match[1].length;
                    const content = formatInline(match[2]);
                    const styles = {
                        1: 'text-3xl font-black text-white mt-10 mb-5 border-b border-white/10 pb-4 break-words',
                        2: 'text-2xl font-bold text-white mt-8 mb-4 break-words',
                        3: 'text-xl font-bold text-blue-300 mt-6 mb-3 break-words',
                        4: 'text-lg font-semibold text-white mt-5 mb-2 break-words'
                    };
                    const style = styles[level] || 'text-md font-semibold text-slate-200 mt-4 mb-2 break-words';
                    return `<h${level} class="${style}">${content}</h${level}>`;
                }
            }

            if (/^[-*]\s/.test(block)) {
                const items = block.split('\n').filter(line => /^[-*]\s/.test(line.trim()));
                const listHtml = items.map(item => `<li class="mb-3 pl-2 leading-relaxed break-words">${formatInline(item.replace(/^[-*]\s+/, ''))}</li>`).join('');
                return `<ul class="mb-6 ml-6 list-disc marker:text-blue-500 text-slate-300">${listHtml}</ul>`;
            }

            if (/^\d+\.\s/.test(block)) {
                const items = block.split('\n').filter(line => /^\d+\.\s/.test(line.trim()));
                const listHtml = items.map(item => `<li class="mb-3 pl-2 leading-relaxed break-words">${formatInline(item.replace(/^\d+\.\s+/, ''))}</li>`).join('');
                return `<ol class="mb-6 ml-6 list-decimal marker:text-blue-500 text-slate-300 font-bold"><span class="font-normal">${listHtml}</span></ol>`;
            }

            return `<p class="mb-5 leading-relaxed text-slate-300 text-[1.05rem] text-justify break-words">${formatInline(block).replace(/\n/g, '<br/>')}</p>`;
        }).join('');
    };

    // --- AI ENGINE ---
    const executeAIEngine = async (prompt, systemPrompt, customContext = "") => {
      const localKey = safeStorage.get('nexus_api_key');
      const grokKey = safeStorage.get('nexus_grok_key');
      
      const modelsToTry = localKey.trim() === "" ? [ { name: "gemini-2.5-flash-preview-09-2025", useSearch: true } ] : [ { name: "gemini-2.5-flash", useSearch: true }, { name: "gemini-1.5-flash", useSearch: false } ];
      let lastError = null;
      let finalDraft = "";
      let finalSources = []; 
      
      const dateContext = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      const temporalInstruction = `[SISTEM WAKTU AKTIF: Hari ini adalah ${dateContext}. Jadikan acuan mutlak. DILARANG berasumsi ini tahun 2023 atau 2024.]\n\n`;
      const fullSystemPrompt = temporalInstruction + systemPrompt;

      // INJEKSI ANCAMAN: Memaksa mesin menulis Markdown Link, bukan teks biasa.
      const strictWarning = "\n\n[PERINGATAN MUTLAK]: 1. WAJIB tulis panjang 1500 kata. 2. Setiap klaim/fakta WAJIB disitasi di tengah kalimat dengan format MARKDOWN KLIKABEL `[Penulis, Tahun](URL)`. JANGAN menulis sitasi teks mati seperti `(Penulis, Tahun)`.";
      const finalPrompt = customContext ? `[KONTEKS LOKAL]:\n${safeContext}\n\n[INSTRUKSI]:\n${prompt}` : prompt + strictWarning;

      // STEP 1: GEMINI CALL
      for (const config of modelsToTry) {
         try {
             const url = `https://generativelanguage.googleapis.com/v1beta/models/${config.name}:generateContent?key=${localKey}`;
             const payload = { 
                 contents: [{ parts: [{ text: finalPrompt }] }], 
                 systemInstruction: { parts: [{ text: fullSystemPrompt }] }, 
                 generationConfig: { temperature: 0.4, maxOutputTokens: 8192 } 
             };
             if (config.useSearch && !customContext) payload.tools = [{ google_search: {} }];
             const res = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
             const data = await res.json();
             
             finalDraft = data.candidates?.[0]?.content?.parts?.[0]?.text;
             
             if (data.candidates?.[0]?.groundingMetadata?.groundingAttributions) {
                 finalSources = data.candidates[0].groundingMetadata.groundingAttributions
                    .map(a => ({ uri: a.web?.uri, title: a.web?.title }))
                    .filter(a => a.uri);
             }
             
             if (!finalDraft) throw new Error("Respons diblokir filter Google. Coba topik lain.");
             break;
         } catch (err) { 
             lastError = err; 
             if (err.status === 401 || err.status === 403) { const e = new Error("HTTP 401: API Key Gemini Ditolak."); e.status = err.status; throw e; } 
         }
      }

      if (!finalDraft) throw new Error(lastError?.message.includes("400") ? "Batasan Sistem: Teks terlalu panjang." : `Gagal: ${lastError?.message || 'Koneksi terputus'}`); 

      // STEP 2: GROK COLLABORATION
      if (grokKey && grokKey.trim() !== "") {
          try {
              const grokPrompt = fullSystemPrompt + `\n\n[INSTRUKSI MUTLAK GROK]: 
              1. DILARANG KERAS MERINGKAS. Draf akhir harus LEBIH PANJANG dari aslinya. Selesaikan semua 5 Bab.
              2. PERTAHANKAN SEMUA SITASI (Penulis, Tahun). 
              3. PERTAHANKAN format Markdown Link [Teks](URL).`;
              
              const grokRes = await fetch("https://api.x.ai/v1/chat/completions", {
                  method: "POST",
                  headers: { "Content-Type": "application/json", "Authorization": `Bearer ${grokKey}` },
                  body: JSON.stringify({
                      model: "grok-beta",
                      messages: [
                          { role: "system", content: grokPrompt },
                          { role: "user", content: `Perdalam dan PERPANJANG analisis draf ini. Pastikan link markdown tetap utuh:\n\n${finalDraft}` }
                      ],
                      temperature: 0.3
                  })
              });
              
              if (grokRes.ok) {
                  const grokData = await grokRes.json();
                  if (grokData.choices?.[0]?.message?.content) finalDraft = grokData.choices[0].message.content;
              }
          } catch(err) { console.warn("Grok API error, fallback ke Gemini murni."); }
      }

      return { text: finalDraft, sources: finalSources };
    };

         setIsMining(true);

             const res = await executeAIEngine("Ekstrak kata kunci", sys, fullText.substring(0, 15000));
             const keys = res.text.split(',').map(k => k.trim().replace(/[^a-zA-Z0-9 -]/g, '')).filter(k => k.length > 3);
             setSuggestions(keys);
         } catch(e) { console.warn("Background AI Mining failed."); } finally { setIsMining(false); }
      };

      const handleFile = async (e) => {
        const file = e.target.files[0]; if(!file) return; setFileName(file.name); setFileState('loading'); setSuggestions([]); setAiAnswer(''); setSearchQuery('');
        try {
          const ext = file.name.split('.').pop().toLowerCase(); let parsed = []; let textRaw = "";
          // FIX PENGGUNAAN STATIC SCRIPT
          if (ext === 'pdf') { const pdfjs = window.pdfjsLib; const doc = await pdfjs.getDocument(await file.arrayBuffer()).promise; for(let i=1; i<=Math.min(doc.numPages, 100); i++){ const t = (await (await doc.getPage(i)).getTextContent()).items.map(t=>t.str).join(' '); parsed.push({page:i, text: t}); textRaw += t + " ";} }
          else if (ext === 'docx') { const res = await window.mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()}); textRaw = res.value; const chunks = textRaw.match(/.{1,2000}/g)||[]; chunks.forEach((c,i)=>parsed.push({page:i+1, text:c})); }
          else throw new Error("Gunakan format PDF/DOCX.");
          setExtractedText(parsed); setFileState('loaded'); onError("Sukses diekstrak.", "success");
          if(textRaw) generateKeywords(textRaw);
        } catch(err) { onError(err.message, "error"); setFileState(null); } e.target.value='';
      };

      const runSearch = async (queryParam) => {
        const finalQuery = typeof queryParam === 'string' ? queryParam : searchQuery;
        if(typeof queryParam === 'string') setSearchQuery(queryParam); 
        if(!finalQuery.trim()) return; 
        setLoading(true); setAiAnswer(''); setIsExpanded(false);
        try { const ctx = extractedText.slice(0, 15).map(p=>`[Hal ${p.page}]: ${p.text}`).join('\n'); setAiAnswer((await executeAIEngine(finalQuery, `Jawab MURNI berdasarkan dokumen. Beri referensi (Hal X).`, ctx)).text); }
        catch(err) { (err.status===401||err.status===403) ? (onError("API Key Ditolak","error"), onOpenSettings()) : setAiAnswer(err.message); } finally { setLoading(false); }
      };

      const runExaminerMode = async () => {
        if(extractedText.length === 0) return;
        setLoading(true); setAiAnswer(''); setIsExpanded(false);
        try { 
          const ctx = extractedText.slice(0, 15).map(p=>`[Hal ${p.page}]: ${p.text}`).join('\n'); 
          const sys = `Anda Profesor Penguji Sidang Akademik. TUGAS MUTLAK:
1. Evaluasi Komprehensif Naskah (Kelebihan & Celah Riset).
2. Simulasi 3 Pertanyaan Sidang tingkat tinggi & Pertahanan Akademisnya.
Gunakan format Markdown murni. DILARANG menggunakan gaya bahasa AI.`;
          setAiAnswer((await executeAIEngine("Lakukan Uji Kritis Akademik pada dokumen ini.", sys, ctx)).text); 
        }
        catch(err) { (err.status===401||err.status===403) ? (onError("API Key Ditolak","error"), onOpenSettings()) : setAiAnswer(err.message); } finally { setLoading(false); }
      };

      return (
        <div className="w-full">
          {fileState === null && (<div className="bg-[#0a1526]/80 border border-blue-400/20 rounded-[3rem] p-10 flex flex-col items-center"><Icons.DocumentSearch className="w-16 h-16 text-blue-400 mb-6" /><h3 className="text-2xl font-bold text-white mb-6">Pemindai Naskah (PDF/DOCX)</h3><label className="w-full max-w-md bg-blue-600 hover:bg-blue-500 text-white min-h-[64px] py-4 rounded-[2rem] flex justify-center items-center font-bold cursor-pointer transition-colors">Pilih Dokumen<input type="file" onChange={handleFile} className="hidden" /></label></div>)}
          {fileState === 'loading' && <div className="py-24 text-center"><div className="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div><p className="text-blue-400">Mengekstrak ke Memori...</p></div>}
          {fileState === 'loaded' && (
            <div className="space-y-8">
              <div className="bg-[#0a1526]/80 p-8 rounded-[3rem] border border-blue-400/20">
                <div className="flex justify-between mb-6 items-center">
                   <h3 className="text-lg font-bold text-white truncate max-w-[80%] uppercase">{fileName}</h3>
                   <button onClick={()=>{setFileState(null);setAiAnswer('');setSuggestions([]);setSearchQuery('');}} className="p-3 bg-red-500/10 text-red-400 rounded-full hover:bg-red-500/20 transition-colors"><Icons.Trash className="w-5 h-5"/></button>
                </div>
                
                <div className="mb-4">
                  <span className="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-2">{isMining ? 'AI Sedang Menambang Topik...' : (suggestions.length > 0 ? 'Topik Krusial Terdeteksi:' : '')}</span>
                  <div className="flex flex-wrap gap-2">
                     {suggestions.map((sug, i) => (
                        <button key={i} onClick={() => runSearch(sug)} disabled={loading} className="bg-blue-500/10 hover:bg-blue-600 text-blue-300 hover:text-white border border-blue-500/20 text-xs px-4 py-2 rounded-xl transition-all shadow-sm font-semibold disabled:opacity-50">
                           {sug}
                        </button>
                     ))}
                  </div>
                </div>

                <form onSubmit={runSearch} className="flex flex-col gap-4">
                  <input type="text" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} placeholder="Tanya AI tentang isi dokumen ini secara manual..." className="w-full min-h-[64px] py-4 bg-[#050a14]/80 border border-white/10 rounded-[2rem] px-6 text-white text-lg outline-none focus:border-blue-500 shadow-inner" />
                  <div className="flex flex-col sm:flex-row gap-4 mt-2">
                    <button type="submit" disabled={!searchQuery||loading} className="flex-1 min-h-[64px] py-4 px-6 bg-blue-600 hover:bg-blue-500 rounded-[2rem] font-bold text-white transition-colors disabled:opacity-50 flex items-center justify-center shadow-lg text-center">Tanya AI</button>
                    <button type="button" onClick={runExaminerMode} disabled={loading} className="flex-1 min-h-[64px] py-4 px-6 bg-red-900/20 hover:bg-red-900/40 border border-red-500/30 rounded-[2rem] font-bold text-red-300 transition-colors disabled:opacity-50 flex items-center justify-center shadow-lg text-center"><Icons.Target className="w-5 h-5 mr-2 shrink-0" /> Uji Kritis (Mode Penguji)</button>
                  </div>
                </form>
              </div>

              {aiAnswer && (
                 <div className={`bg-[#0a1526]/80 border border-blue-400/20 rounded-[3rem] flex flex-col transition-all ${isExpanded ? 'min-h-[50vh]' : 'max-h-[85vh] overflow-hidden'}`}>
                    <div className="shrink-0 p-6 border-b border-blue-500/20 flex justify-between items-center bg-[#050a14]/50 rounded-t-[3rem]">
                       <span className="bg-blue-600 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase">Hasil Analisis</span>
                       <div className="flex space-x-2">
                          <button onClick={() => setIsExpanded(!isExpanded)} className="p-3 bg-blue-500/10 text-blue-400 rounded-full hover:bg-blue-500/20 transition-colors"><Icons.Collapse className="w-5 h-5"/></button>
                          <button onClick={() => copyToClipboard(aiAnswer, () => onError("Disalin.", "success"))} className="p-3 bg-blue-500/10 text-blue-400 rounded-full hover:bg-blue-500/20 transition-colors"><Icons.Copy className="w-5 h-5"/></button>
                       </div>
                    </div>
                    <div className={`p-6 sm:p-10 ${isExpanded ? '' : 'overflow-y-auto custom-scrollbar'}`}>
                       <div className="prose prose-invert max-w-none" dangerouslySetInnerHTML={{__html: parseMarkdownToHTML(aiAnswer)}}/>
                    </div>
                 </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // --- MODUL 5: ACADEMIC REFINER ---
    function AcademicRefinerModule({ onError, onOpenSettings }) {
      const [rawText, setRawText] = useState(''); const [refinedText, setRefinedText] = useState(''); const [loading, setLoading] = useState(false); const [isExtracting, setIsExtracting] = useState(false); const [isExpanded, setIsExpanded] = useState(false);

      const handleFileUpload = async (e) => {
        const file = e.target.files[0]; if(!file) return; setIsExtracting(true); setRawText('Memindai PDF dan membersihkan noise via AI... Mohon tunggu.');
        try {
          const ext = file.name.split('.').pop().toLowerCase(); let text = "";
          // FIX PENGGUNAAN STATIC SCRIPT
          if (ext === 'pdf') { const pdfjs = window.pdfjsLib; const doc = await pdfjs.getDocument(await file.arrayBuffer()).promise; for(let i=1; i<=Math.min(doc.numPages, 30); i++) text += (await (await doc.getPage(i)).getTextContent()).items.map(t=>t.str).join(' ') + "\n"; } 
          else if (ext === 'docx') { text = (await window.mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()})).value; } 
          else { text = await file.text(); }
          
          if(text.length > 500) {
            const sys = `TUGAS MUTLAK: Hapus seluruh Daftar Isi, Daftar Pustaka, Lampiran, dan nomor halaman. Kembalikan HANYA teks inti/daging riset. DILARANG meringkas atau memparafrase.`;
            const clean = await executeAIEngine("Filter dokumen ini", sys, text.substring(0, 30000));
            setRawText(clean.text); onError("Dokumen berhasil difilter.", "success");
          } else { setRawText(text); }
        } catch(err) { onError(`Gagal memproses file: ${err.message}`, "error"); setRawText(''); } finally { setIsExtracting(false); e.target.value = ''; }
      };

      const runRefiner = async (e) => {
        e.preventDefault(); if(!rawText) return; setLoading(true); setIsExpanded(false);
        try { setRefinedText((await executeAIEngine(rawText, `Anda Editor Akademik. TUGAS: Parafrase SANGAT ILMIAH untuk menurunkan Plagiasi (Turnitin). JANGAN mengubah makna.`)).text); }
        catch(err) { (err.status===401||err.status===403) ? (onError("API Key Ditolak","error"), onOpenSettings()) : onError(err.message, "error"); } finally { setLoading(false); }
      };

      return (
        <div className="w-full">
          <div className="bg-[#0a1526]/80 border border-blue-400/20 rounded-[3rem] p-8 mb-12">
            <h3 className="text-2xl font-bold text-white mb-2">Laboratorium Diksi (PDF)</h3>
            <p className="text-sm text-slate-400 mb-6">Unggah PDF. AI akan membuang Daftar Pustaka/Isi otomatis lalu memparafrase isinya untuk lolos Turnitin.</p>
            <div className="mb-6"><label className="bg-blue-600/20 text-blue-300 border border-blue-500/30 px-6 py-3 rounded-2xl text-sm font-bold cursor-pointer inline-flex items-center hover:bg-blue-600/40"><Icons.Upload className="w-5 h-5 mr-2" />{isExtracting ? 'Mengekstrak AI...' : 'Unggah PDF/DOCX'}<input type="file" accept=".pdf,.docx,.txt" onChange={handleFileUpload} className="hidden" disabled={isExtracting} /></label></div>
            <form onSubmit={runRefiner} className="flex flex-col gap-5"><textarea value={rawText} onChange={(e)=>setRawText(e.target.value)} placeholder="Atau paste draf skripsi langsung..." className="w-full min-h-[250px] bg-[#050a14]/80 border border-white/10 rounded-2xl p-6 text-white custom-scrollbar outline-none focus:border-blue-500"></textarea><button type="submit" disabled={loading||!rawText||isExtracting} className="self-end bg-blue-600 hover:bg-blue-500 text-white px-10 min-h-[64px] py-4 rounded-2xl font-bold disabled:opacity-50 transition-colors">{loading?'Memproses...':'Eksekusi Parafrase'}</button></form>
          </div>
          {refinedText && (
             <div className={`bg-[#0a1526]/80 border border-blue-400/20 rounded-[3rem] flex flex-col transition-all ${isExpanded ? 'min-h-[50vh]' : 'max-h-[85vh] overflow-hidden'}`}>
               <div className="shrink-0 p-6 border-b border-blue-500/20 flex justify-between items-center bg-[#050a14]/50 rounded-t-[3rem]">
                  <h3 className="text-xl font-bold text-white">Hasil Parafrase</h3>
                  <div className="flex space-x-2">
                     <button onClick={() => setIsExpanded(!isExpanded)} className="p-3 bg-blue-500/10 text-blue-400 rounded-full hover:bg-blue-500/20 transition-colors"><Icons.Collapse className="w-5 h-5"/></button>
                     <button onClick={()=>copyToClipboard(refinedText,()=>onError("Teks disalin!","success"))} className="p-3 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 rounded-full transition-colors"><Icons.Copy className="w-5 h-5"/></button>
                  </div>
               </div>
               <div className={`p-6 sm:p-10 ${isExpanded ? '' : 'overflow-y-auto custom-scrollbar'}`}>
                  <div className="prose prose-invert max-w-none" dangerouslySetInnerHTML={{__html:parseMarkdownToHTML(refinedText)}}/>
               </div>
             </div>
          )}
        </div>
      );
    }

    // --- MAIN APP ---
    function NexusApp() {
      const [activeTab, setActiveTab] = useState('ai'); 
      const [toast, setToast] = useState({ visible: false, message: '', type: 'error' });
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const triggerToast = (m, t = 'error') => setToast({ visible: true, message: m, type: t });

      return (
        <div className="min-h-screen relative overflow-x-hidden flex flex-col items-center">
          <Toast isVisible={toast.visible} message={toast.message} type={toast.type} onClose={() => setToast(prev => ({...prev, visible: false}))} />
          <ApiKeyModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} />
          <button type="button" onClick={() => setIsSettingsOpen(true)} className="fixed top-6 right-6 z-50 p-3 bg-white/5 border border-white/10 rounded-full shadow-lg hover:bg-white/10 transition-colors"><Icons.Settings className="w-6 h-6 text-slate-400" /></button>
          
          <header className="w-full pt-16 pb-10 flex flex-col items-center px-6">
            <h1 className="text-6xl sm:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-blue-200">NEXUS</h1>
            <p className="text-sm font-bold tracking-[0.3em] text-blue-400 uppercase mt-2">Penelitian Engg Tools</p>
          </header>

          <div className="w-full px-4 mb-12 flex justify-center sticky top-4 z-40">
            <div className="bg-[#050a14]/60 backdrop-blur-[40px] p-2 rounded-3xl border border-blue-400/20 flex space-x-2 overflow-x-auto max-w-full hide-scrollbar">
              <button onClick={()=>setActiveTab('ai')} className={`flex items-center space-x-2 px-5 py-3 rounded-2xl font-bold text-sm shrink-0 transition-all ${activeTab==='ai'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:text-white hover:bg-white/5'}`}><Icons.Brain className="w-5 h-5"/><span>Intelijen</span></button>
              <button onClick={()=>setActiveTab('journal')} className={`flex items-center space-x-2 px-5 py-3 rounded-2xl font-bold text-sm shrink-0 transition-all ${activeTab==='journal'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:text-white hover:bg-white/5'}`}><Icons.Book className="w-5 h-5"/><span>Jurnal</span></button>
              <button onClick={()=>setActiveTab('spss')} className={`flex items-center space-x-2 px-5 py-3 rounded-2xl font-bold text-sm shrink-0 transition-all ${activeTab==='spss'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:text-white hover:bg-white/5'}`}><Icons.Database className="w-5 h-5"/><span>Data</span></button>
              <button onClick={()=>setActiveTab('scanner')} className={`flex items-center space-x-2 px-5 py-3 rounded-2xl font-bold text-sm shrink-0 transition-all ${activeTab==='scanner'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:text-white hover:bg-white/5'}`}><Icons.DocumentSearch className="w-5 h-5"/><span>Pemindai</span></button>
              <button onClick={()=>setActiveTab('refiner')} className={`flex items-center space-x-2 px-5 py-3 rounded-2xl font-bold text-sm shrink-0 transition-all ${activeTab==='refiner'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:text-white hover:bg-white/5'}`}><Icons.PenTool className="w-5 h-5"/><span>Lab Diksi</span></button>
            </div>
          </div>

          <main className="w-full max-w-5xl mx-auto px-4 pb-24 flex-1 flex flex-col z-10 relative">
            <div className={activeTab === 'ai' ? 'w-full block animate-in fade-in' : 'hidden'}><AIResearcherModule onError={triggerToast} onOpenSettings={() => setIsSettingsOpen(true)} /></div>
            <div className={activeTab === 'journal' ? 'w-full block animate-in fade-in' : 'hidden'}><JournalHunterModule onError={triggerToast} /></div>
            <div className={activeTab === 'spss' ? 'w-full block animate-in fade-in' : 'hidden'}><DataAnalyzerModule onError={triggerToast} onOpenSettings={() => setIsSettingsOpen(true)} /></div>
            <div className={activeTab === 'scanner' ? 'w-full block animate-in fade-in' : 'hidden'}><DocumentScannerModule onError={triggerToast} onOpenSettings={() => setIsSettingsOpen(true)} /></div>
            <div className={activeTab === 'refiner' ? 'w-full block animate-in fade-in' : 'hidden'}><AcademicRefinerModule onError={triggerToast} onOpenSettings={() => setIsSettingsOpen(true)} /></div>
          </main>
          
          <style dangerouslySetInnerHTML={{__html: `.custom-scrollbar::-webkit-scrollbar{width:6px}.custom-scrollbar::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.3);border-radius:10px}.hide-scrollbar::-webkit-scrollbar{display:none}`}} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><NexusApp /></ErrorBoundary>);
  </script>
</body>
</html>
